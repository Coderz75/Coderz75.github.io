<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Engineering & Computer Science</title>
    <meta name="description" content="Personal portfolio showcasing engineering projects, experience, and technical skills.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        accent: '#6366f1'
                    }
                }
            }
        }
    </script>
    <style>
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .nav-link.active { color: #6366f1; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-indigo-500/30">

    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 border-b border-transparent">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="#" class="text-xl font-bold tracking-tighter hover:text-indigo-400 transition-colors" id="nav-logo"></a>
            <div class="hidden md:flex space-x-8 text-sm font-medium text-slate-400" id="nav-links">
                </div>
            <button class="md:hidden text-slate-200" id="mobile-menu-btn">
                <i data-lucide="menu"></i>
            </button>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-slate-900 border-b border-slate-800 px-6 py-4 flex flex-col space-y-4"></div>
    </nav>

    <main class="max-w-6xl mx-auto px-6 pt-24">
        <section id="hero" class="min-h-[80vh] flex flex-col justify-center reveal"></section>

        <section id="about" class="py-20 reveal"></section>

        <section id="skills" class="py-20 reveal"></section>

        <section id="projects" class="py-20 reveal">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6">
                <div>
                    <h2 class="text-3xl font-bold mb-4">Featured Projects</h2>
                    <p class="text-slate-400 max-w-md">A collection of systems, tools, and experiments I've built.</p>
                </div>
                <div id="project-filters" class="flex flex-wrap gap-2">
                    </div>
            </div>
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8">
                </div>
        </section>

        <section id="experience" class="py-20 reveal"></section>

        <section id="blog" class="py-24 px-6 max-w-6xl mx-auto reveal"></section>
        <!--<section id="leadership" class="py-20 reveal"></section> -->

        <section id="contact" class="py-20 mb-20 reveal"></section>
    </main>

    <footer class="border-t border-slate-900 py-12 text-center text-slate-500 text-sm">
        <p id="footer-text"></p>
    </footer>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
